<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Wahab Ali Khan</title>
    <link rel="icon" type="image/png" href="/images/profile.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Pre-JS app shell — signals to Safari Reader Mode that this is an interactive app, not an article -->
    <div role="application" aria-label="Wahab Ali Khan — Portfolio" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
      <nav style="position:fixed;top:0;left:0;right:0;height:4rem;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:50;background:transparent;">
        <span style="font-weight:700;font-size:0.9375rem;color:#111827;">Wahab Ali Khan</span>
        <div style="display:flex;gap:1.5rem;font-size:15px;">
          <a href="/" style="color:#6b7280;text-decoration:none;">Work</a>
          <a href="/experience" style="color:#6b7280;text-decoration:none;">Experience</a>
          <a href="mailto:wahab-ali-khan@hotmail.com" style="color:#6b7280;text-decoration:none;">Contact</a>
          <a href="/cv_wahab_ali_khan.pdf" style="color:#6b7280;text-decoration:none;">Resume</a>
        </div>
      </nav>
      <main style="padding-top:5rem;max-width:900px;margin:0 auto;padding-left:1.5rem;padding-right:1.5rem;">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;margin-top:3rem;">
          <div style="width:64px;height:64px;border-radius:50%;background:#e5e7eb;flex-shrink:0;"></div>
          <div>
            <div style="width:320px;height:28px;background:#e5e7eb;border-radius:6px;margin-bottom:8px;"></div>
            <div style="width:200px;height:16px;background:#f3f4f6;border-radius:6px;"></div>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-bottom:2rem;">
          <div style="padding:0.5rem 1rem;background:#111827;border-radius:9999px;width:90px;height:36px;"></div>
          <div style="padding:0.5rem 1rem;background:#f3f4f6;border-radius:9999px;width:110px;height:36px;"></div>
          <div style="padding:0.5rem 1rem;background:#f3f4f6;border-radius:9999px;width:80px;height:36px;"></div>
        </div>
        <div style="display:grid;gap:1.5rem;">
          <div style="border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem;background:#fff;">
            <div style="width:48px;height:48px;background:#e5e7eb;border-radius:8px;margin-bottom:1rem;"></div>
            <div style="width:60%;height:20px;background:#e5e7eb;border-radius:4px;margin-bottom:0.75rem;"></div>
            <div style="width:100%;height:14px;background:#f3f4f6;border-radius:4px;margin-bottom:0.5rem;"></div>
            <div style="width:85%;height:14px;background:#f3f4f6;border-radius:4px;"></div>
          </div>
          <div style="border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem;background:#fff;">
            <div style="width:48px;height:48px;background:#e5e7eb;border-radius:8px;margin-bottom:1rem;"></div>
            <div style="width:55%;height:20px;background:#e5e7eb;border-radius:4px;margin-bottom:0.75rem;"></div>
            <div style="width:100%;height:14px;background:#f3f4f6;border-radius:4px;margin-bottom:0.5rem;"></div>
            <div style="width:90%;height:14px;background:#f3f4f6;border-radius:4px;"></div>
          </div>
        </div>
      </main>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var shell = document.querySelector('[role="application"]');
        if (shell) {
          var root = document.getElementById('root');
          var observer = new MutationObserver(function() {
            if (root && root.children.length > 0) {
              shell.style.display = 'none';
              observer.disconnect();
            }
          });
          observer.observe(root, { childList: true });
        }
      });
    </script>
  </body>
</html>
